version: '3'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Root@143
      MYSQL_DATABASE: org_db
      MYSQL_USER: ganesh
      MYSQL_PASSWORD: Ganesh@sgx143
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql   # ✅ persist data
    networks:
      - springboot-network

  springboot-app:
    build: .
    container_name: springboot-app
    ports:
      - "8081:8082"
    depends_on:
      - mysql
    networks:
      - springboot-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/org_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ganesh
      SPRING_DATASOURCE_PASSWORD: Ganesh@sgx143
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_SHOW_SQL: true

networks:
  springboot-network:

volumes:
  mysql-data: